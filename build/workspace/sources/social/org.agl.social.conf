<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
    <policy user="agl-driver">
        <allow own="org.agl.social"/>
        <allow send_destination="org.agl.social"/>
        <allow receive_sender="org.agl.social"/>
        <allow send_destination="org.agl.media"/>
        <allow receive_sender="org.agl.media"/>
    </policy>

    <policy context="default">
        <allow send_destination="org.agl.social"/>
        <allow receive_sender="org.agl.social"/>
        <allow send_destination="org.agl.media"/>
        <allow receive_sender="org.agl.media"/>
    </policy>
</busconfig>
